<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Not Defterim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --bg:     #0f0f1a;
    --kart:   #1a1a2e;
    --vurgu:  #e040fb;
    --vurgu2: #00e5ff;
    --yazi:   #f0f0ff;
    --gri:    #2a2a3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--yazi);
    font-family: 'Courier Prime', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── KİLİT EKRANI ── */
  #kilitEkrani {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
  }

  #kilitEkrani h2 {
    color: var(--vurgu);
    font-size: 1.4rem;
    letter-spacing: 2px;
  }

  #kilitEkrani input {
    background: var(--gri);
    border: 1px solid var(--vurgu);
    color: var(--yazi);
    font-family: 'Courier Prime', monospace;
    font-size: 1.1rem;
    padding: 10px 16px;
    border-radius: 2px;
    outline: none;
    text-align: center;
    width: 220px;
    letter-spacing: 4px;
  }

  #kilitEkrani .btn-grup { display: flex; gap: 8px; }
  #kilitHata { color: #ff5252; font-size: 0.8rem; min-height: 18px; }

  /* ── ÜST BAR ── */
  .ust-bar { background: var(--vurgu); height: 4px; }

  .baslik {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--vurgu);
    padding: 16px 0 4px;
    letter-spacing: 2px;
  }

  .cizgi {
    text-align: center;
    color: var(--gri);
    font-size: 0.8rem;
    padding-bottom: 8px;
  }

  .ana {
    display: flex;
    gap: 18px;
    padding: 10px 18px;
    flex: 1;
  }

  .sol { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--vurgu2);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 3px;
  }

  input[type="text"], input[type="password"], textarea {
    width: 100%;
    background: var(--gri);
    color: var(--yazi);
    border: none;
    outline: none;
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 0.95rem;
    padding: 8px 10px;
    border-radius: 2px;
    resize: none;
    caret-color: var(--vurgu);
  }

  input[type="text"]:focus, textarea:focus { box-shadow: 0 0 0 1px var(--vurgu); }

  .metin-wrap { border: 1px solid var(--vurgu); border-radius: 2px; }
  textarea { height: 130px; }

  .tarih-goster {
    font-size: 0.72rem;
    color: var(--vurgu2);
    opacity: 0.7;
    padding: 2px 0 0 2px;
    min-height: 16px;
  }

  .butonlar { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
  .buton-satir { display: flex; gap: 5px; }
  .buton-satir .btn { flex: 1; }

  .btn {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    border: none;
    padding: 8px 4px;
    cursor: pointer;
    border-radius: 2px;
    color: var(--bg);
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); opacity: 1; }

  .btn-kaydet { background: var(--vurgu2); }
  .btn-oku    { background: var(--vurgu); }
  .btn-yeni   { background: #b2ff59; }
  .btn-sil    { background: #ff5252; }
  .btn-disari { background: #ffab40; }
  .btn-iceri  { background: #69f0ae; }
  .btn-kilit  { background: #90caf9; }

  .sag { width: 175px; display: flex; flex-direction: column; }

  .liste-wrap {
    border: 1px solid var(--vurgu);
    border-radius: 2px;
    flex: 1;
    overflow-y: auto;
    background: var(--kart);
    margin-top: 3px;
  }

  .liste-wrap::-webkit-scrollbar { width: 6px; }
  .liste-wrap::-webkit-scrollbar-thumb { background: var(--vurgu); border-radius: 3px; }

  .liste-item {
    padding: 8px;
    cursor: pointer;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--gri);
    transition: background 0.1s;
    word-break: break-word;
  }

  .liste-item .not-tarih {
    font-size: 0.65rem;
    color: var(--vurgu2);
    opacity: 0.6;
    display: block;
    margin-top: 2px;
  }

  .liste-item:hover { background: var(--gri); }
  .liste-item.secili { background: var(--vurgu); color: var(--bg); }
  .liste-item.secili .not-tarih { color: var(--bg); opacity: 0.7; }

  .bos-mesaj {
    color: var(--gri);
    font-size: 0.8rem;
    padding: 12px 8px;
    text-align: center;
  }

  .durum {
    background: var(--kart);
    padding: 7px 14px;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--gri);
    min-height: 32px;
    transition: color 0.3s;
  }

  #dosyaInput { display: none; }
</style>
</head>
<body>

<!-- KİLİT EKRANI -->
<div id="kilitEkrani">
  <h2>🔒 NOT DEFTERİM</h2>
  <div id="kilitHata"></div>
  <input type="password" id="sifreInput" placeholder="Şifre..." maxlength="20"
    onkeydown="if(event.key==='Enter') girisYap()">
  <div class="btn-grup">
    <button class="btn btn-kaydet" onclick="girisYap()">GİRİŞ</button>
    <button class="btn btn-sil" onclick="sifreSifirla()">SIFIRLA</button>
  </div>
</div>

<div class="ust-bar"></div>
<div class="baslik">✦ NOT DEFTERİM ✦</div>
<div class="cizgi">────────────────────────────────────────────</div>

<div class="ana">
  <div class="sol">
    <div>
      <label>BAŞLIK</label>
      <input type="text" id="baslikKutu" placeholder="Not başlığı...">
    </div>
    <div>
      <label>NOT İÇERİĞİ</label>
      <div class="metin-wrap">
        <textarea id="metinKutu" placeholder="Notunuzu buraya yazın..."></textarea>
      </div>
      <div class="tarih-goster" id="tarihGoster"></div>
    </div>
    <div class="butonlar">
      <div class="buton-satir">
        <button class="btn btn-kaydet" onclick="kaydet()">💾 KAYDET</button>
        <button class="btn btn-oku"    onclick="oku()">📖 OKU</button>
        <button class="btn btn-yeni"   onclick="yeni()">✨ YENİ</button>
        <button class="btn btn-sil"    onclick="sil()">🗑 SİL</button>
      </div>
      <div class="buton-satir">
        <button class="btn btn-disari" onclick="disariAktar()">📤 DIŞA</button>
        <button class="btn btn-iceri"  onclick="document.getElementById('dosyaInput').click()">📥 İÇE</button>
        <button class="btn btn-kilit"  onclick="kilitle()">🔒 KİLİT</button>
      </div>
    </div>
  </div>

  <div class="sag">
    <label>NOTLARIM</label>
    <div class="liste-wrap" id="listeWrap"></div>
  </div>
</div>

<div class="durum" id="durum">Hazır.</div>
<input type="file" id="dosyaInput" accept=".json" onchange="iceriAktar(event)">

<script>
  let notlar = {};
  let seciliBaslik = null;
  const SIFRE_KEY = 'ndSifre';
  const VERI_KEY  = 'notDefteri';

  function sifreAl() { return localStorage.getItem(SIFRE_KEY) || null; }

  function girisYap() {
    const girilen = document.getElementById('sifreInput').value;
    const kayitli = sifreAl();
    if (!kayitli) {
      if (girilen.length < 4) { document.getElementById('kilitHata').textContent = 'En az 4 karakter!'; return; }
      localStorage.setItem(SIFRE_KEY, girilen);
      kilitKaldir();
    } else {
      if (girilen === kayitli) { kilitKaldir(); }
      else {
        document.getElementById('kilitHata').textContent = '❌ Yanlış şifre!';
        document.getElementById('sifreInput').value = '';
      }
    }
  }

  function kilitKaldir() {
    document.getElementById('kilitEkrani').style.display = 'none';
    document.getElementById('kilitHata').textContent = '';
    document.getElementById('sifreInput').value = '';
    okuDepo();
    listeGuncelle();
    durumGuncelle('✅ Giriş yapıldı.', '#00e5ff');
  }

  function kilitle() {
    document.getElementById('kilitEkrani').style.display = 'flex';
  }

  function sifreSifirla() {
    if (!confirm('Şifreyi sıfırlamak istediğine emin misin?\n⚠ Tüm notlar silinecek!')) return;
    localStorage.removeItem(SIFRE_KEY);
    localStorage.removeItem(VERI_KEY);
    notlar = {}; seciliBaslik = null;
    document.getElementById('kilitHata').textContent = 'Sıfırlandı. Yeni şifre belirleyin.';
    document.getElementById('sifreInput').value = '';
  }

  function kaydetDepo() { localStorage.setItem(VERI_KEY, JSON.stringify(notlar)); }

  function okuDepo() {
    const v = localStorage.getItem(VERI_KEY);
    if (!v) { notlar = {}; return; }
    const ham = JSON.parse(v);
    notlar = {};
    for (const [k, v2] of Object.entries(ham)) {
      notlar[k] = (typeof v2 === 'string') ? { metin: v2, tarih: '' } : v2;
    }
  }

  function listeGuncelle() {
    const wrap = document.getElementById('listeWrap');
    wrap.innerHTML = '';
    const basliklar = Object.keys(notlar);
    if (basliklar.length === 0) { wrap.innerHTML = '<div class="bos-mesaj">Henüz not yok.</div>'; return; }
    basliklar.forEach(b => {
      const el = document.createElement('div');
      el.className = 'liste-item' + (b === seciliBaslik ? ' secili' : '');
      el.innerHTML = `📌 ${b}<span class="not-tarih">${notlar[b].tarih || ''}</span>`;
      el.onclick = () => { seciliBaslik = b; listeGuncelle(); icerikYukle(b); };
      wrap.appendChild(el);
    });
  }

  function icerikYukle(baslik) {
    document.getElementById('baslikKutu').value = baslik;
    document.getElementById('metinKutu').value = notlar[baslik].metin || '';
    document.getElementById('tarihGoster').textContent = notlar[baslik].tarih ? '🕐 ' + notlar[baslik].tarih : '';
    durumGuncelle('📖 Okunuyor → ' + baslik, '#e040fb');
  }

  function simdi() {
    const d = new Date();
    return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function kaydet() {
    const baslik = document.getElementById('baslikKutu').value.trim();
    const icerik = document.getElementById('metinKutu').value.trim();
    if (!baslik) { alert('Başlık boş olamaz!'); return; }
    const tarih = simdi();
    notlar[baslik] = { metin: icerik, tarih };
    seciliBaslik = baslik;
    kaydetDepo(); listeGuncelle();
    document.getElementById('tarihGoster').textContent = '🕐 ' + tarih;
    durumGuncelle('✅ Kaydedildi → ' + baslik, '#00e5ff');
  }

  function oku() {
    if (!seciliBaslik) { durumGuncelle('⚠ Listeden bir not seçin.', '#ffab40'); return; }
    icerikYukle(seciliBaslik);
  }

  function yeni() {
    seciliBaslik = null;
    document.getElementById('baslikKutu').value = '';
    document.getElementById('metinKutu').value = '';
    document.getElementById('tarihGoster').textContent = '';
    listeGuncelle();
    durumGuncelle('✨ Yeni not...', '#2a2a3e');
    document.getElementById('baslikKutu').focus();
  }

  function sil() {
    if (!seciliBaslik) { durumGuncelle('⚠ Listeden bir not seçin.', '#ffab40'); return; }
    if (!confirm('"' + seciliBaslik + '" silinsin mi?')) return;
    const silinen = seciliBaslik;
    delete notlar[silinen]; seciliBaslik = null;
    kaydetDepo(); listeGuncelle();
    document.getElementById('baslikKutu').value = '';
    document.getElementById('metinKutu').value = '';
    document.getElementById('tarihGoster').textContent = '';
    durumGuncelle('🗑 Silindi → ' + silinen, '#ff5252');
  }

  function disariAktar() {
    const blob = new Blob([JSON.stringify(notlar, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'notlar_' + new Date().toLocaleDateString('tr-TR').replace(/\./g, '-') + '.json';
    a.click();
    URL.revokeObjectURL(url);
    durumGuncelle('📤 Notlar dışa aktarıldı.', '#ffab40');
  }

  function iceriAktar(event) {
    const dosya = event.target.files[0];
    if (!dosya) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const gelen = JSON.parse(e.target.result);
        for (const [k, v] of Object.entries(gelen)) {
          notlar[k] = (typeof v === 'string') ? { metin: v, tarih: '' } : v;
        }
        kaydetDepo(); listeGuncelle();
        durumGuncelle('📥 Notlar içe aktarıldı!', '#69f0ae');
      } catch { alert('Hatalı dosya!'); }
    };
    reader.readAsText(dosya);
    event.target.value = '';
  }

  function durumGuncelle(mesaj, renk) {
    const el = document.getElementById('durum');
    el.textContent = mesaj; el.style.color = renk;
  }

  // Başlat
  if (!sifreAl()) document.getElementById('kilitHata').textContent = 'İlk kullanım: Şifrenizi belirleyin.';
</script>
</body>
</html>

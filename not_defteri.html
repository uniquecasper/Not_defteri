<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Not Defterim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --bg:     #0f0f1a;
    --kart:   #1a1a2e;
    --vurgu:  #e040fb;
    --vurgu2: #00e5ff;
    --yazi:   #f0f0ff;
    --gri:    #2a2a3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--yazi);
    font-family: 'Courier Prime', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── ÜST BAR ── */
  .ust-bar { background: var(--vurgu); height: 4px; }

  .baslik {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--vurgu);
    padding: 16px 0 4px;
    letter-spacing: 2px;
  }

  .cizgi {
    text-align: center;
    color: var(--gri);
    font-size: 0.8rem;
    padding-bottom: 8px;
  }

  /* ── ANA İÇERİK ── */
  .ana {
    display: flex;
    gap: 18px;
    padding: 10px 18px;
    flex: 1;
  }

  /* ── SOL ── */
  .sol { flex: 1; display: flex; flex-direction: column; gap: 8px; }

  label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--vurgu2);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 3px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--gri);
    color: var(--yazi);
    border: none;
    outline: none;
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 0.95rem;
    padding: 8px 10px;
    border-radius: 2px;
    resize: none;
    caret-color: var(--vurgu);
  }

  input[type="text"]:focus, textarea:focus {
    box-shadow: 0 0 0 1px var(--vurgu);
  }

  .metin-wrap {
    border: 1px solid var(--vurgu);
    border-radius: 2px;
  }

  textarea { height: 150px; }

  /* ── BUTONLAR ── */
  .butonlar { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

  .btn {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    border: none;
    padding: 9px;
    cursor: pointer;
    border-radius: 2px;
    color: var(--bg);
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  .btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); opacity: 1; }

  .btn-kaydet  { background: var(--vurgu2); }
  .btn-oku     { background: var(--vurgu); }
  .btn-yeni    { background: #b2ff59; }
  .btn-sil     { background: #ff5252; }

  /* ── SAĞ ── */
  .sag { width: 180px; display: flex; flex-direction: column; }

  .liste-wrap {
    border: 1px solid var(--vurgu);
    border-radius: 2px;
    flex: 1;
    overflow-y: auto;
    background: var(--kart);
    margin-top: 3px;
  }

  .liste-wrap::-webkit-scrollbar { width: 6px; }
  .liste-wrap::-webkit-scrollbar-track { background: var(--kart); }
  .liste-wrap::-webkit-scrollbar-thumb { background: var(--vurgu); border-radius: 3px; }

  .liste-item {
    padding: 9px 8px;
    cursor: pointer;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--gri);
    transition: background 0.1s;
    word-break: break-word;
  }

  .liste-item:hover { background: var(--gri); }

  .liste-item.secili {
    background: var(--vurgu);
    color: var(--bg);
  }

  /* ── DURUM ÇUBUĞU ── */
  .durum {
    background: var(--kart);
    padding: 7px 14px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--gri);
    min-height: 32px;
    transition: color 0.3s;
  }

  .bos-mesaj {
    color: var(--gri);
    font-size: 0.8rem;
    padding: 12px 8px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="ust-bar"></div>
<div class="baslik">✦ NOT DEFTERİM ✦</div>
<div class="cizgi">────────────────────────────────────────────</div>

<div class="ana">

  <!-- SOL -->
  <div class="sol">
    <div>
      <label>BAŞLIK</label>
      <input type="text" id="baslikKutu" placeholder="Not başlığı...">
    </div>
    <div>
      <label>NOT İÇERİĞİ</label>
      <div class="metin-wrap">
        <textarea id="metinKutu" placeholder="Notunuzu buraya yazın..."></textarea>
      </div>
    </div>
    <div class="butonlar">
      <button class="btn btn-kaydet" onclick="kaydet()">💾  KAYDET</button>
      <button class="btn btn-oku"    onclick="oku()">📖  OKU</button>
      <button class="btn btn-yeni"   onclick="yeni()">✨  YENİ</button>
      <button class="btn btn-sil"    onclick="sil()">🗑  SİL</button>
    </div>
  </div>

  <!-- SAĞ -->
  <div class="sag">
    <label>NOTLARIM</label>
    <div class="liste-wrap" id="listeWrap">
      <div class="bos-mesaj" id="bosMesaj">Henüz not yok.</div>
    </div>
  </div>

</div>

<div class="durum" id="durum">Hazır.</div>

<script>
  let notlar = {};
  let seciliBaslik = null;

  // ── LocalStorage ──
  function kaydetDepo() {
    localStorage.setItem('notDefteri', JSON.stringify(notlar));
  }

  function okuDepo() {
    const veri = localStorage.getItem('notDefteri');
    notlar = veri ? JSON.parse(veri) : {};
  }

  // ── Liste ──
  function listeGuncelle() {
    const wrap = document.getElementById('listeWrap');
    const bosMsg = document.getElementById('bosMesaj');
    wrap.innerHTML = '';

    const basliklar = Object.keys(notlar);
    if (basliklar.length === 0) {
      const el = document.createElement('div');
      el.className = 'bos-mesaj';
      el.textContent = 'Henüz not yok.';
      wrap.appendChild(el);
      return;
    }

    basliklar.forEach(b => {
      const el = document.createElement('div');
      el.className = 'liste-item' + (b === seciliBaslik ? ' secili' : '');
      el.textContent = '📌 ' + b;
      el.onclick = () => { seciliBaslik = b; listeGuncelle(); icerikYukle(b); };
      el.ondblclick = () => { seciliBaslik = b; listeGuncelle(); icerikYukle(b); };
      wrap.appendChild(el);
    });
  }

  function icerikYukle(baslik) {
    document.getElementById('baslikKutu').value = baslik;
    document.getElementById('metinKutu').value = notlar[baslik] || '';
    durumGuncelle('📖 Okunuyor → ' + baslik, '#e040fb');
  }

  // ── Fonksiyonlar ──
  function kaydet() {
    const baslik = document.getElementById('baslikKutu').value.trim();
    const icerik = document.getElementById('metinKutu').value.trim();
    if (!baslik) { alert('Başlık boş olamaz!'); return; }
    notlar[baslik] = icerik;
    seciliBaslik = baslik;
    kaydetDepo();
    listeGuncelle();
    durumGuncelle('✅ Kaydedildi → ' + baslik, '#00e5ff');
  }

  function oku() {
    if (!seciliBaslik) { durumGuncelle('⚠ Listeden bir not seçin.', '#ffab40'); return; }
    icerikYukle(seciliBaslik);
  }

  function yeni() {
    seciliBaslik = null;
    document.getElementById('baslikKutu').value = '';
    document.getElementById('metinKutu').value = '';
    listeGuncelle();
    durumGuncelle('✨ Yeni not...', '#2a2a3e');
    document.getElementById('baslikKutu').focus();
  }

  function sil() {
    if (!seciliBaslik) { durumGuncelle('⚠ Listeden bir not seçin.', '#ffab40'); return; }
    if (!confirm('"' + seciliBaslik + '" silinsin mi?')) return;
    const silinen = seciliBaslik;
    delete notlar[silinen];
    seciliBaslik = null;
    kaydetDepo();
    listeGuncelle();
    document.getElementById('baslikKutu').value = '';
    document.getElementById('metinKutu').value = '';
    durumGuncelle('🗑 Silindi → ' + silinen, '#ff5252');
  }

  function durumGuncelle(mesaj, renk) {
    const el = document.getElementById('durum');
    el.textContent = mesaj;
    el.style.color = renk;
  }

  // ── Başlat ──
  okuDepo();
  listeGuncelle();
</script>
</body>
</html>
